<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Traveloop — Login</title>
  <meta name="description" content="Login to Traveloop, your smart travel planning companion."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">✈️</div>
        <h1 class="auth-title">Log In</h1>
        <p class="auth-subtitle">Access your Traveloop account</p>
      </div>

      <div id="alertBox" class="alert alert-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input id="email" type="email" class="form-input" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" class="form-input" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button id="loginBtn" type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;margin-top:8px">
          Sign In
        </button>
      </form>

      <div class="auth-link">
        Don't have an account? <a href="signup.html">Create one →</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
