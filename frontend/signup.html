<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Traveloop — Create Account</title>
  <meta name="description" content="Create your Traveloop account and start planning trips."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🌍</div>
        <h1 class="auth-title">Start Exploring</h1>
        <p class="auth-subtitle">Create your free Traveloop account today</p>
      </div>

      <div id="alertBox" class="alert alert-error"></div>

      <form id="signupForm">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input id="name" type="text" class="form-input" placeholder="John Doe" required autocomplete="name"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input id="email" type="email" class="form-input" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" class="form-input" placeholder="Min. 6 characters" required autocomplete="new-password"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" class="form-input" placeholder="Repeat password" required autocomplete="new-password"/>
        </div>
        <button id="signupBtn" type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;margin-top:8px">
          Create Account
        </button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="login.html">Sign in →</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
