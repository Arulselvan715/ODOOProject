<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Traveloop — Social Feed</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
  <style>
    .post-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 24px;
      animation: fadeIn 0.5s ease-out;
    }
    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .post-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .post-author {
      font-weight: 600;
      font-size: 1.1rem;
      margin: 0;
    }
    .post-location {
      color: var(--primary-light);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .post-content {
      line-height: 1.6;
      margin-bottom: 16px;
      color: rgba(255,255,255,0.9);
    }
    .post-rating {
      color: var(--warning);
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    .post-actions {
      display: flex;
      gap: 16px;
      border-top: 1px solid var(--glass-border);
      padding-top: 16px;
    }
    .action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }
    .action-btn:hover {
      color: white;
    }
    .action-btn.liked {
      color: var(--danger);
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">✈️</div>
      <span class="sidebar-logo-text">Traveloop</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="inbox.html" class="nav-link"><span class="nav-icon">📥</span> Inbox</a>
      <a href="social.html" class="nav-link active"><span class="nav-icon">🌍</span> Social</a>
      <a href="dashboard.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="myTrips.html" class="nav-link"><span class="nav-icon">🗺️</span> My Trips</a>
      <a href="createTrip.html" class="nav-link"><span class="nav-icon">➕</span> New Trip</a>
      <div class="nav-section-label" style="margin-top:12px">Account</div>
      <a href="profile.html" class="nav-link"><span class="nav-icon">👤</span> Profile</a>
      <a href="settings.html" class="nav-link"><span class="nav-icon">⚙️</span> Settings</a>
      <button id="logoutBtn" class="nav-link" style="background:none;border:none;cursor:pointer;width:100%;text-align:left;font-size:0.875rem">
        <span class="nav-icon">🚪</span> Logout
      </button>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebarAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebarUserName">Loading...</div>
        <div class="user-email" id="sidebarUserEmail"></div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <button class="hamburger" id="hamburger">☰</button>
      <span class="page-title">Community Feed</span>
    </header>

    <div class="page-content" style="max-width:700px">
      <div style="margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">
        <div>
          <h2 style="font-size:1.5rem;font-weight:700">🌍 Discover Experiences</h2>
          <p style="color:var(--text-muted)">See where other Traveloop members are going and read their reviews.</p>
        </div>
        <select id="socialFilter" class="form-input" style="width:auto;min-width:150px;margin-bottom:0">
          <option value="trending">🔥 Trending</option>
          <option value="newest">✨ Newest</option>
          <option value="top">⭐ Top Rated</option>
        </select>
      </div>

      <div id="socialFeed">
        <!-- Feed populated by JS -->
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/social.js"></script>
</body>
</html>
